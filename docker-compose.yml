services:
  mysql:
    image: ${MYSQL_IMAGE:-m.daocloud.io/docker.io/library/mysql:8.4}
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_NAME:-cardshop}
      MYSQL_USER: ${DB_USER:-cardshop}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cardshop}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root-password}
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --performance-schema=OFF
      --innodb-buffer-pool-size=${MYSQL_INNODB_BUFFER_POOL_SIZE:-256M}
      --max-connections=${MYSQL_MAX_CONNECTIONS:-40}
      --tmp-table-size=${MYSQL_TMP_TABLE_SIZE:-16M}
      --max-heap-table-size=${MYSQL_MAX_HEAP_TABLE_SIZE:-16M}
      --table-open-cache=${MYSQL_TABLE_OPEN_CACHE:-128}
      --thread-cache-size=${MYSQL_THREAD_CACHE_SIZE:-8}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u\"$${MYSQL_USER}\" -p\"$${MYSQL_PASSWORD}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: ${REDIS_IMAGE:-m.daocloud.io/docker.io/library/redis:7-alpine}
    restart: unless-stopped
    command: >
      redis-server
      --save ""
      --appendonly no
      --loglevel warning
      --maxmemory ${REDIS_MAXMEMORY:-128mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-m.daocloud.io/docker.io/library/python:3.13-alpine}
        PYPI_INDEX_URL: ${PYPI_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple/}
        PYPI_TRUSTED_HOST: ${PYPI_TRUSTED_HOST:-mirrors.aliyun.com}
        UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-180}
        UV_HTTP_RETRIES: ${UV_HTTP_RETRIES:-5}
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      DB_ENGINE: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379/0
      SITE_URL: ${SITE_URL:-http://localhost}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-2}
      GUNICORN_THREADS: ${GUNICORN_THREADS:-2}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-60}
      GUNICORN_GRACEFUL_TIMEOUT: ${GUNICORN_GRACEFUL_TIMEOUT:-30}
      GUNICORN_KEEPALIVE: ${GUNICORN_KEEPALIVE:-5}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - static_data:/app/staticfiles
      - backend_logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:24-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-nginx:1.27-alpine}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - static_data:/static:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
  static_data:
  backend_logs:
